name: goal-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and test all CLIs
        run: npm test
      - name: Validate registry
        run: npm install yaml --no-save && npm run validate
      - name: Audit reference repo (dogfood)
        working-directory: tools/goal-audit
        run: node dist/cli.js ../.. --md