name: goal-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and test goal-audit
        working-directory: tools/goal-audit
        run: |
          npm install
          npm test
      - name: Audit reference repo (dogfood)
        working-directory: tools/goal-audit
        run: node dist/cli.js ../.. --md