name: validate-patterns

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check pattern registry files exist
        run: |
          test -f patterns/registry.yaml
          for f in tests-green migrate-module implement-feature fix-bug refactor-safely coverage-target; do
            test -f "patterns/${f}.md"
          done
          echo "All pattern files present"