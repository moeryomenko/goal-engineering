name: validate-patterns

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install yaml for registry validation
        run: npm install yaml --no-save
      - name: Validate pattern registry
        run: node scripts/validate-registry.mjs